version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=https://evolution-api-production-8a3b.up.railway.app

      # Clave secreta para autenticar peticiones — cámbiala
      - AUTHENTICATION_API_KEY=implantarte2026secretkey

      # Instancia
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30

      # Base de datos local (SQLite)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=sqlite

      # Cache local
      - CACHE_LOCAL_ENABLED=true
      - CACHE_REDIS_ENABLED=false

      # Webhooks globales desactivados (configuraremos por instancia)
      - WEBHOOK_GLOBAL_ENABLED=false

      # Desactivar integraciones no usadas
      - WEBSOCKET_ENABLED=false
      - RABBITMQ_ENABLED=false
      - SQS_ENABLED=false
      - CHATWOOT_ENABLED=false
      - OPENAI_ENABLED=false

    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances

    restart: unless-stopped

volumes:
  evolution_store:
  evolution_instances:
